<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProMusic | Stream Your Vibes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #1db954;
            --bg-dark: #0f0f0f;
            --bg-card: #181818;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: black;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item {
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 0;
        }

        .nav-item:hover { color: white; }

        /* Main Content */
        .main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            padding-bottom: 120px;
            background: linear-gradient(to bottom, #222, var(--bg-dark));
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .search-container {
            position: relative;
            width: 400px;
        }

        .search-box {
            width: 100%;
            padding: 12px 40px;
            border-radius: 30px;
            border: none;
            background: #282828;
            color: white;
            outline: none;
        }

        .search-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
        }

        .upload-btn {
            background: white;
            color: black;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-btn:hover { transform: scale(1.05); background: var(--primary); color: white; }

        /* Song Grid */
        .grid-title { margin-bottom: 20px; font-size: 24px; }
        
        .albums {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 8px;
            transition: 0.3s;
            position: relative;
            cursor: pointer;
        }

        .card:hover { background: #282828; }

        .card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .card h3 { font-size: 16px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card p { color: var(--text-dim); font-size: 14px; }

        .play-overlay {
            position: absolute;
            right: 25px;
            bottom: 80px;
            width: 50px;
            height: 50px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.3s;
        }

        .card:hover .play-overlay { opacity: 1; transform: translateY(0); }

        /* Player Bar */
        .player-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #121212;
            border-top: 1px solid #282828;
            padding: 15px 25px;
            display: grid;
            grid-template-columns: 30% 40% 30%;
            align-items: center;
        }

        .current-track { display: flex; align-items: center; gap: 15px; }
        .current-track img { width: 55px; height: 55px; border-radius: 4px; object-fit: cover; }

        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .control-btns { display: flex; align-items: center; gap: 20px; font-size: 20px; }
        .play-pause-circle {
            width: 40px; height: 40px; background: white; color: black;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px;
        }

        .progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: var(--text-dim);
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background: #4f4f4f;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--primary);
            border-radius: 2px;
            pointer-events: none;
        }

        .volume-controls {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] { accent-color: var(--primary); cursor: pointer; }

        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 15px; }
            .sidebar span { display: none; }
            .search-container { width: 150px; }
            .player-bar { grid-template-columns: 1fr 1fr; }
            .volume-controls { display: none; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo"><i class="fas fa-headphones"></i> <span>ProMusic</span></div>
        <div class="nav-item" onclick="location.reload()"><i class="fas fa-home"></i> <span>Home</span></div>
        <div class="nav-item" onclick="document.getElementById('searchInput').focus()"><i class="fas fa-search"></i> <span>Search</span></div>
    </div>

    <div class="main">
        <div class="header-actions">
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" class="search-box" placeholder="Cari lagu..." onkeyup="searchSongs()">
            </div>
            <label class="upload-btn">
                <i class="fas fa-upload"></i> Upload MP3 Lokal
                <input type="file" id="uploadSong" accept="audio/*" hidden>
            </label>
        </div>

        <h2 class="grid-title">Daftar Lagu</h2>
        <div class="albums" id="songList">
            <!-- Lagu akan muncul di sini secara otomatis -->
        </div>
    </div>

    <div class="player-bar">
        <div class="current-track">
            <img src="https://via.placeholder.com/55" id="currentCover">
            <div>
                <h4 id="nowPlayingTitle">Tidak ada lagu</h4>
                <p id="nowPlayingArtist" style="font-size: 12px; color: var(--text-dim);">Pilih sebuah lagu</p>
            </div>
        </div>

        <div class="player-controls">
            <div class="control-btns">
                <i class="fas fa-random" style="font-size:14px; cursor:pointer; color:var(--text-dim)"></i>
                <i class="fas fa-step-backward" style="cursor:pointer"></i>
                <div class="play-pause-circle" onclick="togglePlay()">
                    <i class="fas fa-play" id="playIcon"></i>
                </div>
                <i class="fas fa-step-forward" style="cursor:pointer"></i>
                <i class="fas fa-redo" style="font-size:14px; cursor:pointer; color:var(--text-dim)"></i>
            </div>
            <div class="progress-container">
                <span id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar" onclick="seek(event)">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="volume-controls">
            <i class="fas fa-volume-up"></i>
            <input type="range" min="0" max="1" step="0.1" value="1" onchange="changeVolume(this.value)">
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        const audio = document.getElementById("audioPlayer");
        const songList = document.getElementById("songList");
        const playIcon = document.getElementById("playIcon");
        const progressFill = document.getElementById("progressFill");

        // --- 1. CONFIG: TAMBAH LAGU DEFAULT DI SINI ---
        const defaultSongs = [
            {
                title: "lagu teratas",
                artist: "yanzz",
                url: "tiktokio.com1777449406_9RhVMTJOmNt90bX5pKBN.mp3",
                img: "https://picsum.photos/seed/music1/300"
            },
            {
                title: "gak reti lagune",
                artist: "yanzz",
                url: "tiktokio.com1777456468_3ZrRJWtX0RF7JAmpUXRv.mp3",
                img: "https://picsum.photos/seed/music2/300"
            },
            {
               title: "bct lu anjj",
               artist: "yanzz",
               url: "tiktokio.com1777386318_k4XNuY2ReLzy2zwRTbbI.mp3",
               img: "https://picsum.photos/seed/music2/300"
            },
            {
              title: "kuharap dirinya",
              artist: "yanzz ganteng",
              url: "tiktokio.com1777337206_cLGYORF40x1cd38Wd9rZ.mp3",
              img: "https://picsum.photos/seed/music2/300"
            },
             {
              title: "Locked Out Of Heaven",
              artist: "kak itu ytta",
              url: "Bruno Mars - Locked Out Of Heaven (1).mp3",
              img: "https://picsum.photos/seed/music2/300"
            },
            {
              title: "Sprinter_Central cee",
              artist: "citra",
              url:"Central Cee Dave - Sprinter (Lyrics) (1).mp3",
              img: "https://picsum.photos/seed/music2/300"
            },
            {
              title:"kngtrln",
              artist: "icon seng gawe",
              url: "Perekaman baru 2.mp3",
              img: "https://picsum.photos/seed/music2/300"
            },
            {
              title:"denok",
              artist: "fala",
              url: "Ajeng Febria - Denok (Official Music Live) l Ora Bakal Cukup Lautan Mangsi.mp3",
              img: "https://picsum.photos/seed/music2/300"
            },
                        {
              title:"About you the 1975",
              artist: "adib",
              url: "The 1975 - About You (Lyrics) (1).mp3",
              img: "https://picsum.photos/seed/music2/300"
            },
            {
              title:"karna kamu",
              artist: "yanzz",
              url: "Karena Kamu - Geisha Lirik karenamu ku cemburu Galaubrutal (1).mp3",
              img: "https://picsum.photos/seed/music2/300"
            }
        ];

        // --- 2. LOGIC INITIATION ---
        window.onload = () => {
            // Tampilkan lagu default
            defaultSongs.forEach(s => addSongToUI(s.title, s.url, s.img, s.artist));
            
            // Tampilkan lagu dari upload (LocalStorage)
            const savedSongs = JSON.parse(localStorage.getItem('mySongs')) || [];
            savedSongs.forEach(s => addSongToUI(s.title, s.url, s.img, "Uploaded File"));
        }

        // --- 3. FUNCTIONS ---
        function addSongToUI(title, url, img, artist) {
            const div = document.createElement("div");
            div.className = "card";
            div.innerHTML = `
                <img src="${img}">
                <div class="play-overlay"><i class="fas fa-play" style="color:black"></i></div>
                <h3>${title}</h3>
                <p>${artist}</p>
            `;
            div.onclick = () => playSong(title, url, img, artist);
            songList.appendChild(div);
        }

        function playSong(title, url, img, artist) {
            audio.src = url;
            audio.play();
            playIcon.classList.replace("fa-play", "fa-pause");
            
            document.getElementById("nowPlayingTitle").innerText = title;
            document.getElementById("nowPlayingArtist").innerText = artist;
            document.getElementById("currentCover").src = img;
        }

        function togglePlay() {
            if(!audio.src) return;
            if(audio.paused) {
                audio.play();
                playIcon.classList.replace("fa-play", "fa-pause");
            } else {
                audio.pause();
                playIcon.classList.replace("fa-pause", "fa-play");
            }
        }

        // Progress Bar & Time
        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = pct + "%";
            document.getElementById("currentTime").innerText = formatTime(audio.currentTime);
            if(audio.duration) document.getElementById("duration").innerText = formatTime(audio.duration);
        };

        function formatTime(sec) {
            let min = Math.floor(sec / 60);
            let s = Math.floor(sec % 60);
            return min + ":" + (s < 10 ? "0" + s : s);
        }

        function seek(e) {
            const bar = document.getElementById("progressBar");
            const rect = bar.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.width;
            audio.currentTime = (clickX / width) * audio.duration;
        }

        function changeVolume(val) { audio.volume = val; }

        // --- 4. UPLOAD LOGIC ---
        document.getElementById("uploadSong").addEventListener("change", function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const songData = {
                        title: file.name.replace(".mp3", ""),
                        url: event.target.result,
                        img: `https://picsum.photos/seed/${Math.random()}/300`
                    };
                    
                    // Simpan ke LocalStorage agar tidak hilang saat refresh
                    const savedSongs = JSON.parse(localStorage.getItem('mySongs')) || [];
                    savedSongs.push(songData);
                    localStorage.setItem('mySongs', JSON.stringify(savedSongs));
                    
                    addSongToUI(songData.title, songData.url, songData.img, "Local Upload");
                    playSong(songData.title, songData.url, songData.img, "Local Upload");
                };
                reader.readAsDataURL(file);
            }
        });

        // --- 5. SEARCH LOGIC ---
        function searchSongs() {
            let input = document.getElementById("searchInput").value.toLowerCase();
            let cards = document.querySelectorAll(".card");
            cards.forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(input) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
